<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fallende Mathe-Challenge 🚀</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('neon-bg.jpg'); 
            background-attachment: fixed; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-color: #030712; 
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        .game-container {
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(10px); 
            border: 2px solid #00d2ff; 
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3); 
            text-align: center;
            width: 400px;
            transition: all 0.3s ease;
        }
        
        h1 { color: #00d2ff; margin: 0 0 5px 0; font-size: 24px; }
        
        .combo-badge {
            font-size: 16px;
            color: #ff0055;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            height: 20px;
            transition: all 0.2s ease;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
        
        .box-container {
            position: relative;
            width: 100%;
            height: 350px; 
            background: rgba(3, 7, 18, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .falling-question {
            position: absolute;
            left: 0;
            right: 0;
            top: 0px; 
            font-size: 28px;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0 0 10px #00d2ff;
        }
        
        .game-input {
            width: 120px;
            padding: 10px;
            font-size: 22px;
            border-radius: 5px;
            border: 2px solid #00d2ff;
            background: #030712;
            color: white;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
        }
        
        .stats-container {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }

        .score-display { color: #00ffcc; }
        .highscore-display { color: #ffaa00; }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #a0aec0;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #00d2ff; }
    </style>
</head>
<body>

    <div class="game-container" id="gameCard">
        <h1>Math Drop Ultimate 🧠☄️</h1>
        <div class="combo-badge" id="comboText"></div>
        
        <div class="box-container">
            <div class="falling-question" id="questionText">Berechne...</div>
        </div>

        <input type="number" id="userInput" class="game-input" placeholder="?" autofocus>

        <div class="stats-container">
            <div class="score-display">Punkte: <span id="scoreText">0</span></div>
            <div class="highscore-display">🏆 Highscore: <span id="highscoreText">0</span></div>
        </div>
        
        <a href="index.html" class="back-link">← Zurück zur Startseite</a>
    </div>

    <script>
        let num1, num2, correctAnswer;
        let score = 0;
        let highscore = 0;
        let currentY = 0;     
        let startSpeed = 1.2;  
        let fallSpeed = 1.2;    
        let gameInterval;     
        let isGameOver = false;

        let comboCount = 0;
        let multiplier = 1;
        let lastSolveTime = 0;
        let canAnswer = true; 

        function loadHighscore() {
            try {
                let savedHighscore = localStorage.getItem('mathDropHighscore');
                if (savedHighscore !== null) {
                    highscore = parseInt(savedHighscore);
                    document.getElementById('highscoreText').innerText = highscore;
                }
            } catch (e) {
                highscore = 0;
                document.getElementById('highscoreText').innerText = highscore;
            }
        }

        function updateHighscore() {
            try {
                if (score > highscore) {
                    highscore = score;
                    localStorage.setItem('mathDropHighscore', highscore);
                    document.getElementById('highscoreText').innerText = highscore;
                }
            } catch (e) {}
        }

        function generateQuestion() {
            if (isGameOver) return;

            const operators = ['+', '-', '*'];
            const randomOperator = operators[Math.floor(Math.random() * operators.length)];

            if (randomOperator === '+') {
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
                correctAnswer = num1 + num2;
                document.getElementById('questionText').innerText = num1 + " + " + num2;
            } else if (randomOperator === '-') {
                num1 = Math.floor(Math.random() * 20) + 5;
                num2 = Math.floor(Math.random() * num1) + 1; 
                correctAnswer = num1 - num2;
                document.getElementById('questionText').innerText = num1 + " - " + num2;
            } else if (randomOperator === '*') {
                num1 = Math.floor(Math.random() * 10) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
                correctAnswer = num1 * num2;
                document.getElementById('questionText').innerText = num1 + " × " + num2;
            }
            
            currentY = 0;
            document.getElementById('questionText').style.top = currentY + "px";
            document.getElementById('userInput').value = ""; 
            document.getElementById('userInput').focus();
        }

        function startFalling() {
            gameInterval = setInterval(() => {
                if (isGameOver) return;

                currentY += fallSpeed;
                document.getElementById('questionText').style.top = currentY + "px";
                
                if (currentY >= 310) {
                    clearInterval(gameInterval);
                    isGameOver = true;
                    
                    updateHighscore();
                    comboCount = 0;
                    multiplier = 1;
                    document.getElementById('comboText').innerText = "";

                    document.getElementById('gameCard').style.borderColor = "#ff0055";
                    document.getElementById('gameCard').style.boxShadow = "0 0 30px rgba(255, 0, 85, 0.8)";
                    
                    alert("Game Over!\nDeine Punkte: " + score);
                    
                    score = 0;
                    fallSpeed = startSpeed; 
                    document.getElementById('scoreText').innerText = score;
                    isGameOver = false;
                    canAnswer = true;
                    document.getElementById('gameCard').style.borderColor = "#00d2ff";
                    document.getElementById('gameCard').style.boxShadow = "0 0 20px rgba(0, 210, 255, 0.3)";
                    
                    generateQuestion();
                    startFalling();
                }
            }, 30);
        }

        document.getElementById('userInput').addEventListener('input', () => {
            if (!canAnswer) return;

            let userInputField = document.getElementById('userInput');
            let userAnswer = parseInt(userInputField.value);
            let card = document.getElementById('gameCard');

            if (!isNaN(userAnswer) && userAnswer === correctAnswer) {
                canAnswer = false;
                userInputField.value = "";

                let now = Date.now();
                let timeTaken = (now - lastSolveTime) / 1000;
                lastSolveTime = now;

                if (timeTaken <= 1.65) {
                    comboCount++;
                    if (comboCount >= 6) {
                        multiplier = 3;
                        document.getElementById('comboText').innerText = "🔥 Mega Combo x3! 🔥";
                    } else if (comboCount >= 3) {
                        multiplier = 2;
                        document.getElementById('comboText').innerText = "⚡ Combo x2! ⚡";
                    }
                } else {
                    comboCount = 1; 
                    multiplier = 1;
                    document.getElementById('comboText').innerText = "";
                }

                score += multiplier;
                document.getElementById('scoreText').innerText = score;
                updateHighscore();

                if (score < 15) {
                    fallSpeed = startSpeed + (score * 0.03); 
                } else if (score < 40) {
                    fallSpeed = startSpeed + 0.45 + ((score - 15) * 0.05); 
                } else {
                    fallSpeed = startSpeed + 1.7 + ((score - 40) * 0.1); 
                }

                card.style.borderColor = "#00ffcc";
                card.style.boxShadow = "0 0 30px rgba(0, 255, 204, 0.8)";
                                clearInterval(gameInterval);
                setTimeout(() => {
                    card.style.borderColor = "#00d2ff";
                    card.style.boxShadow = "0 0 20px rgba(0, 210, 255, 0.3)";
                    generateQuestion();
                    startFalling();
                    canAnswer = true;
                }, 200);
            }
        });

        loadHighscore();
        lastSolveTime = Date.now();
        generateQuestion();
        startFalling();
    </script>
</body>
</html>
