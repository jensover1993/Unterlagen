<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subnetz-Rechner – Jens Overkämping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #030712 0%, #0b1528 50%, #030712 100%);
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #00d2ff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            box-sizing: border-box;
        }
        h1, h2 { color: #00d2ff; margin-top: 0; }
        p { line-height: 1.6; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background-color: #00ffcc;
            color: #030712;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border: 1px solid #00d2ff;
            border-radius: 5px;
            background: rgba(3, 7, 18, 0.6);
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .calc-btn {
            width: 100%;
            padding: 12px;
            background-color: #00d2ff;
            color: #030712;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .calc-btn:hover { background-color: #00ffcc; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(3, 7, 18, 0.5);
            border-left: 4px solid #00ffcc;
            border-radius: 4px;
            display: none;
        }
        .result-item { margin-bottom: 10px; font-size: 15px; }
        .result-item strong { color: #00ffcc; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">← Zurück zum Profil</a>
        <h1>🧮 IP-Klassen Analyzer</h1>
        <p>Ein im Selbststudium entwickeltes JavaScript-Tool zur schnellen Analyse von IPv4-Adressen und deren Standard-Netzwerkklassen.</p>
        
        <label for="ipInput">Geben Sie eine IPv4-Adresse ein (z.B. 192.168.1.1):</label>
        <input type="text" id="ipInput" placeholder="192.168.1.1">
        <button class="calc-btn" onclick="analyzeIP()">Adresse analysieren</button>

        <div class="result-box" id="resultBox">
            <div class="result-item"><strong>Netzwerkklasse:</strong> <span id="resClass">-</span></div>
            <div class="result-item"><strong>Standard-Subnetzmaske:</strong> <span id="resMask">-</span></div>
            <div class="result-item"><strong>Verwendung:</strong> <span id="resType">-</span></div>
        </div>
    </div>

    <script>
        function analyzeIP() {
            const ipStr = document.getElementById('ipInput').value.trim();
            const resultBox = document.getElementById('resultBox');
            
            // Einfache Validierung mit Regex für IPv4
            const ipPattern = /^([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})\.([0-9]{1,3})$/;
            if (!ipPattern.test(ipStr)) {
                alert("Bitte geben Sie eine gültige IPv4-Adresse ein (z.B. 192.168.2.10).");
                return;
            }

            const parts = ipStr.split('.').map(Number);
            const firstOctet = parts[0];

            if (parts.some(num => num > 255)) {
                alert("Die Zahlenwerte einer IP dürfen maximal 255 betragen.");
                return;
            }

            let netClass = "";
            let subMask = "";
            let useType = "";

            // Logik für Netzwerkklassen (A, B, C)
            if (firstOctet >= 1 && firstOctet <= 126) {
                netClass = "Klasse A";
                subMask = "255.0.0.0";
                useType = (firstOctet === 10) ? "Privater Adressraum (Großunternehmen)" : "Öffentlicher Adressraum";
            } else if (firstOctet === 127) {
                netClass = "Loopback (Lokale Testadresse)";
                subMask = "255.0.0.0";
                useType = "Interner Software-Test (Localhost)";
            } else if (firstOctet >= 128 && firstOctet <= 191) {
                netClass = "Klasse B";
                subMask = "255.255.0.0";
                useType = (firstOctet === 172 && parts[1] >= 16 && parts[1] <= 31) ? "Privater Adressraum (Mittlere Netzwerke)" : "Öffentlicher Adressraum";
            } else if (firstOctet >= 192 && firstOctet <= 223) {
                netClass = "Klasse C";
                subMask = "255.255.255.0";
                useType = (firstOctet === 192 && parts[1] === 168) ? "Privater Adressraum (Heimnetzwerke / Kleinbetriebe)" : "Öffentlicher Adressraum";
            } else if (firstOctet >= 224 && firstOctet <= 239) {
                netClass = "Klasse D (Multicast)";
                subMask = "Nicht definiert";
                useType = "Spezielle Datenübertragung (z.B. IPTV / Routing-Protokolle)";
            } else {
                netClass = "Klasse E (Experimentell)";
                subMask = "Nicht definiert";
                useType = "Forschung und zukünftige Nutzung";
            }

            // Ergebnisse einblenden
            document.getElementById('resClass').innerText = netClass;
            document.getElementById('resMask').innerText = subMask;
            document.getElementById('resType').innerText = useType;
            resultBox.style.display = "block";
        }
    </script>
</body>
</html>
